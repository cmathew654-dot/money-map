name: Verify

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Use Node.js 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install browser test engines
        run: npx playwright install --with-deps chromium webkit

      # The app's type stack is system serifs (Iowan Old Style / Palatino
      # Linotype / Georgia). Ubuntu has none of them, and the DejaVu fallback
      # renders wider text than any of them — wide enough that a flow label
      # pill physically outgrew the model's footprint estimate and covered a
      # card, failing the label-clearance e2e only on CI. P052 is the
      # Palatino-metric URW face; the aliases below make Chromium resolve the
      # app's stack to it so CI measures the same geometry users' machines do.
      - name: Install Palatino-metric fonts
        run: |
          sudo apt-get install -y fonts-urw-base35 fontconfig
          mkdir -p ~/.config/fontconfig
          cat > ~/.config/fontconfig/fonts.conf <<'EOF'
          <?xml version="1.0"?>
          <!DOCTYPE fontconfig SYSTEM "fonts.dtd">
          <fontconfig>
            <alias><family>Iowan Old Style</family><accept><family>P052</family></accept></alias>
            <alias><family>Palatino Linotype</family><accept><family>P052</family></accept></alias>
            <alias><family>Palatino</family><accept><family>P052</family></accept></alias>
            <alias><family>Georgia</family><accept><family>P052</family></accept></alias>
          </fontconfig>
          EOF
          fc-cache -f
          fc-match "Palatino Linotype"

      - name: Verify
        run: npm run verify

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: test-results
          path: test-results/
          if-no-files-found: ignore
